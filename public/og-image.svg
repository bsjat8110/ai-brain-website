<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow effect -->
  <ellipse cx="600" cy="315" rx="400" ry="280" fill="url(#glow)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Brain node network -->
  <g opacity="0.5">
    <circle cx="140" cy="200" r="6" fill="#a78bfa"/>
    <circle cx="220" cy="160" r="4" fill="#60a5fa"/>
    <circle cx="180" cy="270" r="5" fill="#a78bfa"/>
    <circle cx="260" cy="230" r="4" fill="#60a5fa"/>
    <line x1="140" y1="200" x2="220" y2="160" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="140" y1="200" x2="180" y2="270" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="220" y1="160" x2="260" y2="230" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="180" y1="270" x2="260" y2="230" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
  </g>
  <g opacity="0.5">
    <circle cx="960" cy="380" r="6" fill="#a78bfa"/>
    <circle cx="1040" cy="340" r="4" fill="#60a5fa"/>
    <circle cx="1000" cy="450" r="5" fill="#a78bfa"/>
    <circle cx="1080" cy="410" r="4" fill="#60a5fa"/>
    <line x1="960" y1="380" x2="1040" y2="340" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="960" y1="380" x2="1000" y2="450" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="1040" y1="340" x2="1080" y2="410" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
  </g>
  <!-- Gradient divider line -->
  <rect x="100" y="390" width="1000" height="2" fill="url(#accent)" opacity="0.6" rx="1"/>
  <!-- Main text -->
  <text x="600" y="240" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="96" fill="white" text-anchor="middle" letter-spacing="-2">AI BRAIN</text>
  <!-- Gradient on AI -->
  <text x="600" y="240" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="96" fill="url(#accent)" fill-opacity="0" text-anchor="middle" letter-spacing="-2">AI BRAIN</text>
  <!-- Subtitle -->
  <text x="600" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#a78bfa" text-anchor="middle" letter-spacing="1">The Next Generation AI Platform</text>
  <!-- Domain -->
  <text x="600" y="460" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="500" font-size="22" fill="#6b7280" text-anchor="middle">aibrainstartup.com</text>
  <!-- Tags -->
  <g>
    <rect x="370" y="490" width="130" height="36" rx="18" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
    <text x="435" y="513" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">Multi-AI Chat</text>
    <rect x="520" y="490" width="160" height="36" rx="18" fill="#60a5fa" fill-opacity="0.15" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
    <text x="600" y="513" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle">Persistent Memory</text>
    <rect x="700" y="490" width="130" height="36" rx="18" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.4"/>
    <text x="765" y="513" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">3D Brain Map</text>
  </g>
</svg>
