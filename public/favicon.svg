<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0a0a0f"/>
  <!-- Brain neural network nodes -->
  <circle cx="11" cy="11" r="3" fill="url(#g)"/>
  <circle cx="21" cy="11" r="3" fill="url(#g)"/>
  <circle cx="16" cy="20" r="3" fill="url(#g)"/>
  <circle cx="7"  cy="20" r="2" fill="url(#g)" opacity="0.6"/>
  <circle cx="25" cy="20" r="2" fill="url(#g)" opacity="0.6"/>
  <!-- Connections -->
  <line x1="11" y1="11" x2="21" y2="11" stroke="url(#g)" stroke-width="1.5"/>
  <line x1="11" y1="11" x2="16" y2="20" stroke="url(#g)" stroke-width="1.5"/>
  <line x1="21" y1="11" x2="16" y2="20" stroke="url(#g)" stroke-width="1.5"/>
  <line x1="11" y1="11" x2="7"  y2="20" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
  <line x1="21" y1="11" x2="25" y2="20" stroke="url(#g)" stroke-width="1" opacity="0.5"/>
</svg>
